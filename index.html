<!DOCTYPE html>
<html lang="en">
<head>

  <title>Happy 1st Anniversary ❤️</title>

  <link rel="stylesheet" href="style.css">

<body>

<div id="loading">

    <div class="heart">❤️</div>

    <h1>A Special Delivery</h1>

    <p>Only For</p>

</div>

<!-- ================= Main ================= -->

<div id="main" class="hidden">

<section class="welcome">

<h1>Happy 1st Anniversary ❤️</h1>

<p>
04 • 07 • 2025
</p>

</section>

</div>

</div>

</div>

<button id="openEnvelope">

</button>

</section>

<h2>

Before opening...

One Question 😏

</h2>

<p>

Do you really want to know
what is inside?

</p>

<button id="yesBtn">

Yes ❤️

</button>

<p id="funnyText"></p>

</section>

<!-- ================= Letter ================= -->

<section id="letterSection" class="hidden">

<div class="realLetter">

<h1>

My Love ❤️

</h1>

<div id="typing"></div>

</div>

<button id="nextGallery">

</button>

</section>

<!-- Gallery will come in Part-3 -->

<script src="script.js"></script>
