<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy 1st Anniversary ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#fff0f5,#ffe6ef,#fffaf5);
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
}

.hidden{
display:none;
}

button{
padding:15px 35px;
border:none;
border-radius:40px;
background:#d6336c;
color:#fff;
font-size:18px;
cursor:pointer;
transition:.3s;
box-shadow:0 10px 20px rgba(0,0,0,.2);
}

button:hover{
transform:translateY(-3px);
}

#loading{
position:fixed;
inset:0;
background:linear-gradient(135deg,#ffb3c6,#ff8fab);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:#fff;
z-index:99999;
}

.loader{
font-size:80px;
animation:beat 1s infinite;
}

@keyframes beat{

50%{
transform:scale(1.2);
}

}

#loading h1{
margin-top:20px;
font-size:42px;
}

.container{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
width:100%;
}

#envelope{
position:relative;
width:340px;
height:220px;
background:#b22222;
border-radius:12px;
overflow:hidden;
box-shadow:0 18px 35px rgba(0,0,0,.25);
}

#flap{
position:absolute;
width:100%;
height:120px;
background:#941515;
clip-path:polygon(0 0,100% 0,50% 100%);
transform-origin:top;
transition:1s;
z-index:5;
}

#paper{
position:absolute;
left:20px;
bottom:-300px;
width:300px;
height:390px;
background:white;
border-radius:12px;
padding:25px;
transition:1.4s;
box-shadow:0 10px 20px rgba(0,0,0,.2);
}

#paper h2{
font-size:34px;
}

#paper h3{
font-family:'Dancing Script',cursive;
font-size:34px;
color:#d6336c;
margin:12px 0;
}

#paper p{
font-size:20px;
margin-top:8px;
}

.open #flap{
transform:rotateX(180deg);
}

.open #paper{
bottom:20px;
}

#question{
margin-top:35px;
text-align:center;
}

#question h2{
margin-bottom:20px;
color:#d6336c;
}

#yesBtn{
position:relative;
transition:.25s;
}

#funny{
margin-top:20px;
font-size:20px;
font-weight:bold;
height:30px;
color:#b22222;
}

#letterCard{
display:none;
width:90%;
max-width:760px;
background:#fff;
padding:35px;
border-radius:18px;
box-shadow:0 15px 30px rgba(0,0,0,.18);
margin-top:25px;
}

#letterCard h1{
font-family:'Dancing Script',cursive;
font-size:52px;
color:#d6336c;
margin-bottom:20px;
}

#typing{
white-space:pre-wrap;
line-height:2;
font-size:19px;
text-align:left;
}

</style>

</head>

<body>

<div id="loading">

<div class="loader">❤️</div>

<h1>A Special Delivery</h1>

<p>Only For</p>

<h2>Thirtha ❤️</h2>

</div>

<div class="container hidden" id="main">

<div id="envelope">

<div id="flap"></div>

<div id="paper">

<h2>💌</h2>

<h3>To My Favourite Human</h3>

<p>Thirtha</p>

<p>(Gulgulir Baba ❤️)</p>

</div>

</div>

<br>

<button id="openBtn">

Open Letter ❤️

</button>

<div id="question" class="hidden">

<h2>

Do you really want to know what's inside? 😏

</h2>

<button id="yesBtn">

YES ❤️

</button>

<p id="funny"></p>

</div>

<div id="letterCard">

<h1>My Love ❤️</h1>

<div id="typing"></div>
  </div>

<script>
const loading=document.getElementById("loading");
const main=document.getElementById("main");

setTimeout(()=>{

loading.style.display="none";
main.classList.remove("hidden");

},2500);

const envelope=document.getElementById("envelope");
const openBtn=document.getElementById("openBtn");
const question=document.getElementById("question");

openBtn.onclick=()=>{

envelope.classList.add("open");

openBtn.style.display="none";

setTimeout(()=>{

question.classList.remove("hidden");

},1700);

};

const yesBtn=document.getElementById("yesBtn");
const funny=document.getElementById("funny");

const funnyText=[

"😜 এত সহজে না!",
"🤭 আরেকবার চেষ্টা করো!",
"😂 এখনও না!",
"🙈 একটু আর চেষ্টা করো!",
"❤️ ঠিক আছে... খুলছে!"

];

let move=0;

function moveButton(){

if(move>=4)return;

let x=Math.random()*260-130;
let y=Math.random()*160-80;

yesBtn.style.transform=`translate(${x}px,${y}px)`;

funny.innerHTML=funnyText[move];

move++;

}

yesBtn.addEventListener("mouseenter",moveButton);

yesBtn.addEventListener("touchstart",(e)=>{

if(move<4){

e.preventDefault();

moveButton();

}

});

const letterCard=document.getElementById("letterCard");
const typing=document.getElementById("typing");

const letter=`

আজ আমাদের প্রথম বিবাহবার্ষিকী...

৪ জুলাই ২০২৬...

হআমার সবচেয়ে প্রিয় মানুষ,

আমার Team Mate,
আমার Safe Place,
❤️

ধন্যবাদ...

আমার পাশে থাকার জন্য।
আমার মানুষ হওয়ার জন্য। ❤️

আমার সব রাগ,
অভিমান,
অযৌক্তিক কান্না,
সবকিছু ধৈর্য ধরে সহ্য করার জন্য।

Happy First Anniversary, My Love. ❤️

Forever Yours,

Tohamoni ❤️

`;

let i=0;

function typeWriter(){

    letterCard.style.display="block";

    function write(){

        if(i<letter.length){

            typing.innerHTML+=letter.charAt(i);
          console.log(i, letter.charAt(i));

            i++;

            setTimeout(write,45);

        }else{

            setTimeout(showFinalScreen,1500);

        }

    }

    write();



}

yesBtn.addEventListener("click",()=>{

if(move<4)return;

question.style.display="none";

typeWriter();

});
</script>

<style>

.floatHeart{
position:fixed;
bottom:-40px;
font-size:22px;
pointer-events:none;
animation:heartFly 6s linear forwards;
z-index:999;
}

@keyframes heartFly{
0%{
transform:translateY(0) scale(.5);
opacity:1;
}
100%{
transform:translateY(-120vh) scale(1.8);
opacity:0;
}
}

.rose{
position:fixed;
top:-40px;
font-size:24px;
pointer-events:none;
animation:roseFall 8s linear forwards;
z-index:998;
}

@keyframes roseFall{
100%{
transform:translateY(120vh) rotate(720deg);
opacity:.2;
}
}

#finalScreen{
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(135deg,#ffe4ea,#fff8f4);
text-align:center;
z-index:99999;
padding:20px;
}

#finalScreen h1{
font-family:'Dancing Script',cursive;
font-size:65px;
color:#d6336c;
margin-bottom:15px;
}

#finalScreen h2{
font-size:32px;
margin-bottom:10px;
}

#finalScreen p{
font-size:20px;
margin-bottom:15px;
}

#gallery{
margin-top:20px;
}

#slide{
width:280px;
height:380px;
object-fit:cover;
border-radius:18px;
box-shadow:0 12px 25px rgba(0,0,0,.25);
transition:opacity .8s;
}

#musicBtn{
margin-top:25px;
}

</style>

<div id="finalScreen">

<h1>Happy 1st Anniversary ❤️</h1>

<h2>Tohamoni ❤️ Thirtha</h2>

<p>04 • 07 • 2026</p>

<div id="gallery">

<img id="slide" src="images/1.jpg">

</div>

<button id="musicBtn">🎵 Play Music</button>

<audio id="music" loop>
    <source src="BTS - Butter.mp3" type="audio/mpeg">
</audio>

</div>
<script>
function showFinalScreen(){

document.getElementById("finalScreen").style.display="flex";

}

function createHeart(){

let h=document.createElement("div");

h.className="floatHeart";

h.innerHTML="❤️";

h.style.left=Math.random()*100+"vw";

h.style.fontSize=(18+Math.random()*24)+"px";

document.body.appendChild(h);

setTimeout(()=>{

h.remove();

},6000);

}

setInterval(createHeart,450);

function createRose(){

let r=document.createElement("div");

r.className="rose";

r.innerHTML="🌹";

r.style.left=Math.random()*100+"vw";

document.body.appendChild(r);

setTimeout(()=>{

r.remove();

},8000);

}

setInterval(createRose,900);

const photos=[
"images/1.jpg",
"images/2.jpg",
"images/3.jpg",
"images/4.jpg",
"images/5.jpg",
"images/6.jpg",
"images/7.jpg",
"images/8.jpg",
"images/9.jpg",
"images/10.jpg"
];

let current=0;

  setInterval(()=>{

const img=document.getElementById("slide");

if(!img) return;

img.style.opacity="0";

setTimeout(()=>{

current=(current+1)%photos.length;

img.src=photos[current];

img.style.opacity="1";

},500);

},2500);

const music=document.getElementById("music");
const musicBtn=document.getElementById("musicBtn");

musicBtn.onclick=function(){

if(music.paused){

music.play();

musicBtn.innerHTML="⏸ Pause Music";

}else{

music.pause();

musicBtn.innerHTML="🎵 Play Music";

}

};

document.addEventListener("click",()=>{

music.play().catch(()=>{});

},{once:true});

document.getElementById("finalScreen").addEventListener("click",()=>{

for(let i=0;i<20;i++){

setTimeout(()=>{

let h=document.createElement("div");

h.className="floatHeart";

h.innerHTML=Math.random()>0.5?"❤️":"💖";

h.style.left=Math.random()*100+"vw";

h.style.fontSize=(20+Math.random()*25)+"px";

document.body.appendChild(h);

setTimeout(()=>{

h.remove();

},6000);

},i*120);

}

});
</script>

</body>

</html>
