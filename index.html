<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy 1st Anniversary ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{

font-family:'Poppins',sans-serif;

background:linear-gradient(135deg,#fff0f5,#ffe9ec,#fff9ef);

overflow:hidden;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

}

.hidden{
display:none;
}

button{

padding:15px 35px;

border:none;

border-radius:40px;

background:#d6336c;

color:white;

font-size:18px;

cursor:pointer;

transition:.3s;

box-shadow:0 10px 20px rgba(0,0,0,.2);

}

button:hover{

transform:translateY(-3px);

}

#loading{

position:fixed;

inset:0;

background:linear-gradient(135deg,#ffcad4,#ff8fab);

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

color:white;

z-index:9999;

}

.loaderHeart{

font-size:80px;

animation:beat 1s infinite;

}

@keyframes beat{

50%{

transform:scale(1.2);

}

}

#loading h1{

margin-top:20px;

font-size:40px;

}

#loading p{

margin-top:12px;

}

.container{

width:100%;

display:flex;

justify-content:center;

align-items:center;

flex-direction:column;

}

#envelope{

position:relative;

width:340px;

height:220px;

background:#b22222;

border-radius:12px;

overflow:hidden;

box-shadow:0 18px 35px rgba(0,0,0,.25);

}

#top{

position:absolute;

width:100%;

height:120px;

background:#8f1111;

clip-path:polygon(0 0,100% 0,50% 100%);

transform-origin:top;

transition:1s;

z-index:5;

}

#letter{

position:absolute;

left:20px;

bottom:-300px;

width:300px;

height:380px;

background:#fffefb;

border-radius:12px;

padding:25px;

transition:1.4s;

box-shadow:0 12px 25px rgba(0,0,0,.2);

}

#letter h2{

font-size:36px;

margin-bottom:15px;

}

#letter h3{

font-family:'Dancing Script',cursive;

font-size:34px;

color:#d6336c;

margin-bottom:15px;

}

#letter p{

font-size:20px;

margin-top:10px;

}

.open #top{

transform:rotateX(180deg);

}

.open #letter{

bottom:15px;

}

#question{

margin-top:35px;

text-align:center;

}

#question h2{

margin-bottom:20px;

color:#d6336c;

}

#yesBtn{

position:relative;

transition:.25s;

}

#funnyText{

margin-top:20px;

font-size:20px;

font-weight:bold;

height:30px;

color:#b22222;

}

#typingCard{

display:none;

width:90%;

max-width:720px;

background:white;

padding:35px;

border-radius:18px;

box-shadow:0 15px 30px rgba(0,0,0,.18);

margin-top:25px;

}

#typingCard h1{

font-family:'Dancing Script',cursive;

font-size:52px;

color:#d6336c;

margin-bottom:20px;

}

#typing{

white-space:pre-wrap;

line-height:2;

font-size:19px;

text-align:left;

}

@media(max-width:768px){

#envelope{

width:300px;

height:200px;

}

#letter{

width:260px;

left:20px;

}

#typingCard{

padding:22px;

}

#typingCard h1{

font-size:42px;

}

}

</style>

</head>

<body>

<div id="loading">

<div class="loaderHeart">❤️</div>

<h1>A Special Delivery</h1>

<p>Only For</p>

<h2>Thirtha Das</h2>

</div>

<div class="container hidden" id="main">

<div id="envelope">

<div id="top"></div>

<div id="letter">

<h2>💌</h2>

<h3>To My Favourite Human</h3>

<p>Thirtha Das</p>

<p>(Gulgulir Baba ❤️)</p>

</div>

</div>

<br>

<button id="openBtn">

Open Letter ❤️

</button>

<div id="question" class="hidden">

<h2>

Do you really want to know what's inside? 😏

</h2>

<button id="yesBtn">

YES ❤️

</button>

<p id="funnyText"></p>

</div>

<div id="typingCard">

<h1>My Love ❤️</h1>

<div id="typing"></div>

</div>
<script>

const loading=document.getElementById("loading");
const main=document.getElementById("main");

setTimeout(()=>{

loading.style.display="none";
main.classList.remove("hidden");

},2500);

const envelope=document.getElementById("envelope");
const openBtn=document.getElementById("openBtn");
const question=document.getElementById("question");

openBtn.onclick=()=>{

envelope.classList.add("open");

openBtn.style.display="none";

setTimeout(()=>{

question.classList.remove("hidden");

},1700);

};

const yesBtn=document.getElementById("yesBtn");
const funnyText=document.getElementById("funnyText");

const funny=[

"😜 এত সহজে না!",
"🤭 আরেকবার চেষ্টা করো!",
"😂 এখনও না!",
"🙈 একটু আর চেষ্টা করো!",
"❤️ wait।"
  

];

let move=0;

function moveYes(){

if(move>=4)return;

let x=Math.random()*250-125;
let y=Math.random()*150-75;

yesBtn.style.transform=`translate(${x}px,${y}px)`;

funnyText.innerHTML=funny[move];

move++;

}

yesBtn.addEventListener("mouseenter",moveYes);

yesBtn.addEventListener("touchstart",(e)=>{

if(move<4){

e.preventDefault();

moveYes();

}

});

const typingCard=document.getElementById("typingCard");
const typing=document.getElementById("typing");

const letter=`


আচ্ছা...

এত কষ্ট করে খুললে...

এখন আর বন্ধ করা যাবে না... 😜❤️


আমার সবচেয়ে প্রিয় মানুষ,

তীর্থ...

(আমার গুলগুলির বাবা ❤️)


আজ আমাদের প্রথম বিবাহবার্ষিকী।

৪ জুলাই ২০২৫...


এই একটা বছরে...

হাসি ছিল,

রাগ ছিল,

অভিমান ছিল,

কিন্তু...

ভালোওবাসি। ❤️



আমি শুধু চাই...

প্রতিদিন ঘুম ভাঙুক

তোমার পাশে। ❤️


তুমি আমার


Team Mate,

Safe Place...


Happy 1st Anniversary ❤️

 ❤️


`;

let i=0;

function typeWriter(){

typingCard.style.display="block";

function write(){

if(i<letter.length){

typing.innerHTML+=letter.charAt(i);

i++;

setTimeout(write,35);

}else{

setTimeout(showFinalScreen,1500);

}

}

write();

}

yesBtn.addEventListener("click",()=>{

if(move<4)return;

question.style.display="none";

typeWriter();

});
<style>

.floatHeart{

position:fixed;

bottom:-40px;

font-size:22px;

pointer-events:none;

animation:heartFly 6s linear forwards;

z-index:999;

}

@keyframes heartFly{

0%{

transform:translateY(0) scale(.5);

opacity:1;

}

100%{

transform:translateY(-120vh) scale(1.8);

opacity:0;

}

}

.rose{

position:fixed;

top:-40px;

font-size:24px;

pointer-events:none;

animation:roseFall 8s linear forwards;

z-index:998;

}

@keyframes roseFall{

100%{

transform:translateY(120vh) rotate(720deg);

opacity:.2;

}

}

#finalScreen{

position:fixed;

left:0;

top:0;

width:100%;

height:100%;

display:none;

justify-content:center;

align-items:center;

flex-direction:column;

text-align:center;

background:linear-gradient(135deg,#ffe4ea,#fff7f2);

z-index:99999;

animation:fadeIn 1.2s;

}

@keyframes fadeIn{

from{

opacity:0;

}

to{

opacity:1;

}

}

#finalScreen h1{

font-family:'Dancing Script',cursive;

font-size:68px;

color:#d6336c;

}

#finalScreen h2{

margin-top:20px;

font-size:34px;

}

#finalScreen p{

margin-top:15px;

font-size:22px;

}

#finalBtn{

margin-top:35px;

}

</style>

<div id="finalScreen">

<h1>Happy Anniversary ❤️</h1>

<h2>

Tohamoni ❤️ Thirtha

</h2>

<p>

04 • 07 • 2026

</p>

<p>

Forever Starts With Us ❤️

</p>

<button id="finalBtn">

One Last Surprise ❤️

</button>

</div>

<script>

function createHeart(){

let h=document.createElement("div");

h.className="floatHeart";

h.innerHTML="❤️";

h.style.left=Math.random()*100+"vw";

h.style.fontSize=(18+Math.random()*24)+"px";

document.body.appendChild(h);

setTimeout(()=>{

h.remove();

},6000);

}

setInterval(createHeart,450);

function createRose(){

let r=document.createElement("div");

r.className="rose";

r.innerHTML="🌹";

r.style.left=Math.random()*100+"vw";

document.body.appendChild(r);

setTimeout(()=>{

r.remove();

},8000);

}

setInterval(createRose,900);

function showFinalScreen(){

document.getElementById("finalScreen").style.display="flex";

}

document.getElementById("finalBtn").onclick=function(){

document.getElementById("finalScreen").innerHTML=`

<h1 style="font-size:72px;">❤️</h1>

<h2 style="font-family:'Dancing Script',cursive;
font-size:56px;
color:#d6336c;">

In Every Lifetime...

</h2>

<p style="font-size:28px;
margin-top:30px;">

I'd Still Choose You ❤️

</p>

<p style="margin-top:35px;
font-size:22px;">

Happy 1st Anniversary

</p>

<p style="font-size:26px;">

Tohamoni ❤️ Thirtha

</p>

`;

};
</script>

</body>

</html>
